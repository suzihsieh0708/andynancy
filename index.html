<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 婚宴座位查詢與報到系統</title>
  <style>
    /* 白綠清新風格主題變數 */
    :root {
      --primary-color: #2E5A44;    /* 森林深綠 */
      --secondary-color: #557A64;  /* 葉綠色 */
      --accent-color: #EBF2EE;     /* 淡草綠底色 */
      --bg-white: #FFFFFF;         /* 純白 */
      --text-main: #2C3E35;        /* 深綠黑文字 */
      --text-muted: #7A8A81;       /* 灰綠色文字 */
    }

    body { 
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
      background-color: var(--accent-color);
      color: var(--text-main);
      padding: 30px 20px; 
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    h2 {
      color: var(--primary-color);
      text-align: center;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }
    
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 25px;
    }

    .section { 
      background-color: var(--bg-white);
      padding: 20px; 
      margin-bottom: 20px; 
      border-radius: 12px; 
      box-shadow: 0 4px 12px rgba(46, 90, 68, 0.05);
      border: 1px solid rgba(85, 122, 100, 0.1);
    }

    h3 {
      color: var(--primary-color);
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 16px;
      border-left: 4px solid var(--primary-color);
      padding-left: 10px;
    }

    /* 統計看板樣式 */
    .dashboard {
      display: flex;
      justify-content: space-around;
      text-align: center;
      padding: 15px 5px;
    }
    .stat-item { flex: 1; }
    .stat-number { 
      font-size: 28px; 
      font-weight: bold; 
      color: var(--primary-color);
      margin-bottom: 5px;
    }
    .stat-label { font-size: 12px; color: var(--text-muted); }

    /* 輸入框與按鈕 */
    .search-group { display: flex; gap: 8px; }
    input[type="text"], select { 
      flex: 1;
      padding: 12px; 
      font-size: 14px; 
      border: 1px solid rgba(85, 122, 100, 0.3);
      border-radius: 8px;
      outline: none;
      color: var(--text-main);
      background-color: var(--bg-white);
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(46, 90, 68, 0.1);
    }
    button { 
      padding: 12px 20px; 
      font-size: 14px; 
      background-color: var(--primary-color); 
      color: var(--bg-white); 
      border: none; 
      cursor: pointer; 
      border-radius: 8px; 
      font-weight: bold;
      transition: background 0.2s;
    }
    button:hover { background-color: #224332; }

    .result-box { margin-top: 15px; font-size: 14px; min-height: 20px; }

    /* 名單列表樣式 */
    .guest-list { margin-top: 15px; }
    .guest-item { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 12px 8px; 
      border-bottom: 1px solid rgba(85, 122, 100, 0.08); 
    }
    .guest-item:last-child { border-bottom: none; }
    
    /* 質感 Checkbox 樣式 */
    .checkbox-container {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 14px;
      user-select: none;
    }
    .checkbox-container input { display: none; }
    .custom-checkbox {
      height: 18px;
      width: 18px;
      border: 2px solid var(--secondary-color);
      border-radius: 4px;
      margin-right: 8px;
      display: inline-block;
      position: relative;
    }
    .checkbox-container input:checked + .custom-checkbox {
      background-color: var(--primary-color);
      border-color: var(--primary-color);
    }
    .checkbox-container input:checked + .custom-checkbox::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 1px;
      width: 5px;
      height: 10px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .status-text { font-size: 13px; font-weight: bold; width: 50px; text-align: right; }
    .status-in { color: var(--primary-color); }
    .status-out { color: var(--text-muted); }
  </style>
</head>
<body>

    ];


// 將資料格式化為以人名為 key 的物件（避免覆蓋欄位）
    const finalGuestsData = {};
    initialGuestsRaw.forEach(g => {
    // 處理含有特殊空格的人名作為 Key，並給予預設 checkin: falseconst safeKey = g.name.replace(/./g, "_");
      finalGuestsData[safeKey] = { name: g.name, table: g.table, checkin: false };
    });
    let globalGuestsData = {};const dbRef = ref(database, 'wedding_v2');
    // 3. 即時監聽與自動初始化
    onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) {
    // 如果資料庫是空的，網頁會「自動」在後端建立完整的 143 位名單set(dbRef, finalGuestsData)
      .then(() => console.log("✨ 雲端資料庫初始化完成！已匯入 143 位賓客名單"))
      .catch(err => alert("寫入失敗，請確認 Firebase Rules 規則已開啟為 true。"));
    } else {
      globalGuestsData = data;
      calculateStats();
      renderGuestList(document.getElementById('tableSelector').value);
    }
    });
    
    // ==========================================
    // 核心功能：即時動態計算全場到場人數
    // ==========================================
    function calculateStats() {
    let total = 0;
    let checked = 0;
    for (const key in globalGuestsData) {
    total++;
    if (globalGuestsData[key].checkin === true) {
    checked++;
    }
    }
    const rate = total > 0 ? Math.round((checked / total) * 100) : 0;
    document.getElementById('statTotal').innerText = total;
    document.getElementById('statChecked').innerText = checked;
    document.getElementById('statRate').innerText = ${rate}%;
    }
    
    // ==========================================
    // 功能一：輸入姓名快速搜尋
    // ==========================================
    document.getElementById('btnSearch').addEventListener('click', () => {
    const searchName = document.getElementById('searchName').value.trim();
    const resultDiv = document.getElementById('searchResult');
    if (!searchName) {
      resultDiv.innerHTML = "⚠️ 請輸入姓名";
      return;
    }
      let found = false;
      for (const key in globalGuestsData) {
      const guest = globalGuestsData[key];
      if (guest.name === searchName) {
      resultDiv.innerHTML = <div style="background:#f4f7f5; padding:12px; border-radius:8px; 
        border-left:4px solid var(--primary-color);"> 🌿 找到賓客：<strong>${guest.name}</strong><br> 📍 安排座位：<span style="color:var(--primary-color); font-weight:bold;">${guest.table}</span><br> 📝 報到狀態：${guest.checkin ? '<span class="status-in">已到場</span>' : '<span class="status-out">未到場</span>'} </div>;
        found = true;
        break;
      }
      }
      if (!found) {
        resultDiv.innerHTML = <span style='color:#d9534f;'>❌ 找不到【${searchName}】，請確認字是否有輸入錯誤。</span>;
          }
    });
    
    // ==========================================
    // 功能二：依據選擇的桌次，渲染賓客打勾列表
    // ==========================================
    const container = document.getElementById('guestListContainer');
    const selector = document.getElementById('tableSelector');
    
    selector.addEventListener('change', (e) => renderGuestList(e.target.value));
    
    function renderGuestList(selectedTable) {
      container.innerHTML = "";
      
      // 篩選出該桌的賓客const filtered = [];
      for (const key in globalGuestsData) {
        if (globalGuestsData[key].table === selectedTable) {
          filtered.push({ dbKey: key, ...globalGuestsData[key] });
        }
      }
      
      if (filtered.length === 0) {
        container.innerHTML = "資料讀取中或此桌無賓客...";
        return;
      }
      // 開始渲染 UI 節點
      filtered.forEach(guest => {
        const div = document.createElement('div');
        div.className = 'guest-item';
        div.innerHTML = `
        ${guest.name}
        `;
        
        // 綁定打勾監聽事件：即時連線更新至 Firebase 雲端
        const checkbox = div.querySelector('input[type="checkbox"]');
        checkbox.addEventListener('change', (e) => {
          const dbKey = e.target.getAttribute('data-key');
          const status = e.target.checked;
          
          const updates = {};
          updates[wedding_v2/${dbKey}/checkin] = status;
            
          // 送至資料庫（全場多台手機會同時秒速跳動同步人數）
          update(ref(database), updates);
        });
        
        container.appendChild(div);
      });
    }
